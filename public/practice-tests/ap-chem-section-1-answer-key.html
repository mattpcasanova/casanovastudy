<style>
  :root {
    --green: #1a3d2e;
    --green-soft: #2d5544;

    --gold: #c8a951;

    --muted: #6b6b6b;

  body { padding: 24px 32px 80px; max-width: 1100px; margin: 0 auto; }

  header.masthead {
    border-bottom: 2px solid var(--green);
    padding-bottom: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;

    font-weight: 700;
    font-size: 1.9rem;
    color: var(--green);

    margin-top: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;

    background: var(--green);
    color: var(--cream);
    padding: 18px 22px;
    border-radius: 6px;
    margin-bottom: 32px;
  }
  .quick-ref h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 1.2rem;
    color: var(--gold);
    margin-bottom: 12px;

    display: grid;

  .answer-card {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold);
    border-radius: 4px;
    padding: 22px 26px;
    margin-bottom: 18px;

    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: var(--green);
    font-weight: 700;
  }
  .answer-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green);
    color: var(--cream);
    padding: 4px 12px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }
  .answer-pill .letter {
    color: var(--gold);
    font-size: 1.15rem;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
  }
  .topic-tag {
    background: rgba(26,61,46,0.08);
    color: var(--green-soft);
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .q-prompt {
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 14px;
    font-style: italic;
    color: var(--green-soft);
  }
  .explanation {
    font-size: 0.97rem;
    line-height: 1.62;
    color: var(--ink);
  }
  .explanation strong { color: var(--green); }
  .explanation .calc {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    background: white;
    border: 1px solid var(--line);
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 3px;
    color: var(--green);
    overflow-x: auto;
  }
  .explanation .key-point {
    display: block;
    background: rgba(200,169,81,0.15);
    border-left: 3px solid var(--gold);
    padding: 8px 12px;
    margin: 8px 0;
    font-size: 0.9rem;
    border-radius: 0 3px 3px 0;
  }

  /* Stem context */
  .stem-banner {
    background: var(--green-soft);
    color: var(--cream);
    padding: 14px 22px;
    border-radius: 6px;
    margin: 28px 0 12px;
    font-size: 0.92rem;
    line-height: 1.5;

    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    display: block;
    margin-bottom: 6px;

  /* Print */
  @media print {
    body { padding: 0; background: white; max-width: 100%; }
    .answer-card { break-inside: avoid; padding: 14px 0; border: none; border-bottom: 1px solid #ccc; border-radius: 0; }

    .quick-ref h2 { color: #333; }
    .quick-ref-cell { background: white; color: black; border: 1px solid #999; }
    .quick-ref-cell .ans { color: black; }
  }

  @media (max-width: 640px) {
    body { padding: 16px; }
    .answer-card { padding: 16px; }
  }

Q = reaction quotient — same form as K, but using current concentrations (not equilibrium). Tells you how far from equilibrium you are.</span>

(reactants)&nbsp;&nbsp;&nbsp;&nbsp;(products)</span>

Denominator (reactants): [Ag⁺]²
Q = [Fe²⁺] / [Ag⁺]²</span>

  { n:14, ans:'A', topic:'Bonding',

  { n:16, ans:'D', topic:'Equilibrium',
